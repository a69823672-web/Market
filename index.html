<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>کافه پرواز</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logoBox">

<img src="logo.png" class="logo">

<h1>کافه پرواز</h1>

<p>
شرکت هوانوردی عقاب آسمان شمال
</p>

</div>

</header>

<section class="categorySection">

<div id="categoryContainer">

<button class="cat active" data-cat="همه">
همه
</button>

<button class="cat" data-cat="قهوه">
قهوه
</button>

<button class="cat" data-cat="نوشیدنی سرد">
نوشیدنی سرد
</button>

<button class="cat" data-cat="چای">
چای
</button>

<button class="cat" data-cat="دسر">
دسر
</button>

<button class="cat" data-cat="کیک">
کیک
</button>

<button class="cat" data-cat="صبحانه">
صبحانه
</button>

<button class="cat" data-cat="غذا">
غذا
</button>

</div>

</section>

<main>

<div id="products">

</div>

</main>

<button id="adminButton">

⚙

</button>

<div id="adminPanel">

<div class="panel">

<h2>
پنل مدیریت
</h2>

<input
type="password"
id="loginPassword"
placeholder="رمز مدیریت">

<button id="loginBtn">
ورود
</button>

<div id="adminArea">

<h3>
ثبت محصول
</h3>

<input
type="text"
id="name"
placeholder="نام محصول">

<input
type="number"
id="price"
placeholder="قیمت">

<input
type="text"
id="category"
placeholder="دسته بندی">

<input
type="text"
id="image"
placeholder="آدرس عکس">

<button id="addProduct">

ثبت محصول

</button>

</div>

<button id="closeAdmin">

بستن

</button>

</div>

</div>

<section class="videoSection">

<h2>

ویدئوی معرفی

</h2>

<video
controls
playsinline>

<source
src="video.mp4"
type="video/mp4">

مرورگر شما ویدئو را پشتیبانی نمی‌کند.

</video>

</section>

<footer>

<p>

© کافه پرواز

</p>

</footer>

<script src="script.js"></script>

</body>

</html>
